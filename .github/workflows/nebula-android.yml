name: Nebula Android

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'build/**'
      - 'ci/**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate Public Source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate source hygiene
        run: bash scripts/validate-public-source.sh

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.2'

      - name: Ensure Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install \
            'platforms;android-36' \
            'build-tools;36.0.0'

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Write SHA256
        run: |
          cd app/build/outputs/apk/debug
          sha256sum app-debug.apk > app-debug.apk.sha256
          cat app-debug.apk.sha256

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: droidspaces-nebula-debug
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/app-debug.apk.sha256
          if-no-files-found: error
